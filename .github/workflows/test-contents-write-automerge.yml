name: TEST - Enable auto-merge with contents write GITHUB_TOKEN

on:
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-24.04
    steps:
      - name: Enable auto-merge with GITHUB_TOKEN (contents write)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ inputs.pr-number }}" --auto --squash --repo "${{ github.repository }}"
