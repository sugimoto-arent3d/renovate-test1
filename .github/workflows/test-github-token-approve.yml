name: TEST - Approve PR with GITHUB_TOKEN

on:
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-24.04
    steps:
      - name: Approve PR with GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review "${{ inputs.pr-number }}" --approve --repo "${{ github.repository }}"
