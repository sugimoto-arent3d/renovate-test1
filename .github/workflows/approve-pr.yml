name: Approve PR

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      app-id:
        required: true
        type: string
    secrets:
      app-private-key:
        required: true

permissions:
  contents: read

jobs:
  approve:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-pull-requests: write

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review "${{ inputs.pr-number }}" --approve --repo "${{ github.repository }}"
