name: TEST - Enable auto-merge with App token

on:
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number

permissions:
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-24.04
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APPROVE_APP_ID }}
          private-key: ${{ secrets.APPROVE_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Enable auto-merge with App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge "${{ inputs.pr-number }}" --auto --squash --repo "${{ github.repository }}"
