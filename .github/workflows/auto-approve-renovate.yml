name: Auto-approve Renovate PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve-and-enable-automerge:
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review "${{ github.event.pull_request.number }}" --approve --repo "${{ github.repository }}"

      - name: Enable auto-merge
        if: "contains(github.event.pull_request.body, '**Automerge**: Enabled')"
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --repo "${{ github.repository }}"
